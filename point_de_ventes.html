<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i Fratelli — Trouver un point de vente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:     #C41230;
  --red-dk:  #8a0d22;
  --green:   #2d7a3a;
  --white:   #fff;
  --light:   #f8f6f3;
  --border:  #e8e4de;
  --char:    #1a1a1a;
  --muted:   #6b6560;
  --sw:      390px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--light);overflow:hidden;}

.app{display:flex;height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);min-width:var(--sw);
  display:flex;flex-direction:column;
  background:var(--white);
  box-shadow:2px 0 20px rgba(0,0,0,.08);
  z-index:10;overflow:hidden;
}

/* ── HEADER ── */
.hd{
  background:#1a1a1a;
  padding:20px 20px 18px;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.hd::after{
  content:'';
  position:absolute;bottom:-1px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),#e85220,var(--red));
}
.hd-logo-row{
  display:flex;align-items:center;gap:14px;margin-bottom:16px;
}
.hd-fratelli-logo{
  height:58px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
}
.hd-h1{
  font-size:20px;font-weight:700;color:#fff;
  line-height:1.2;margin-bottom:4px;letter-spacing:-.3px;
}
.hd-h1 span{color:var(--red);}
.hd-sub{
  font-size:11px;font-weight:400;color:rgba(255,255,255,.45);
  letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;
}
.dot-live{
  width:7px;height:7px;border-radius:50%;
  background:#4caf50;display:inline-block;
  box-shadow:0 0 0 0 rgba(76,175,80,.6);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(76,175,80,.5);}
  70%{box-shadow:0 0 0 8px rgba(76,175,80,0);}
  100%{box-shadow:0 0 0 0 rgba(76,175,80,0);}
}

/* ── SEARCH ── */
.search-wrap{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--white);
}
.search-row{
  display:flex;align-items:center;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--light);overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.search-row:focus-within{
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(196,18,48,.09);
  background:#fff;
}
.search-row input{
  flex:1;border:none;outline:none;background:transparent;
  padding:11px 12px;font-family:'Poppins',sans-serif;
  font-size:13px;color:var(--char);font-weight:400;
}
.search-row input::placeholder{color:#bbb;font-weight:300;}
.ico-search,.ico-clear{
  padding:0 12px;display:flex;align-items:center;color:#bbb;cursor:pointer;
}
.ico-clear{display:none;}
.ico-clear.show{display:flex;}
.btn-geo{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;margin-top:10px;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--white);cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;
  color:var(--muted);transition:all .18s;
}
.btn-geo:hover{background:var(--char);color:#fff;border-color:var(--char);}
.btn-geo svg{width:14px;height:14px;flex-shrink:0;}

/* ── FILTERS ── */
.filters-wrap{
  padding:12px 16px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.filters-lbl{
  font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;
}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px 5px 7px;
  border:1.5px solid var(--border);border-radius:20px;
  background:var(--white);cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;
  color:var(--muted);transition:all .15s;user-select:none;
  opacity:.55;
}
.chip img{width:16px;height:16px;object-fit:contain;border-radius:2px;}
.chip.on{
  opacity:1;background:var(--light);
  color:var(--char);border-color:#c0bbb4;
}
.chip.on[data-chain="Carrefour"]{border-color:#004F9F;color:#004F9F;}
.chip.on[data-chain="Intermarché"]{border-color:#e30613;color:#e30613;}
.chip.on[data-chain="Delhaize"]{border-color:#C41230;color:#C41230;}
.chip.on[data-chain="Spar"]{border-color:#006f3c;color:#006f3c;}
.chip.on[data-chain="Cora"]{border-color:#e85220;color:#e85220;}
.chip.on[data-chain="Comarché"]{border-color:#1a7a35;color:#1a7a35;}
.chip.on[data-chain="Q8"]{border-color:#c4940a;color:#c4940a;}
.chip.on[data-chain="Autre"]{border-color:#888;color:#555;}

/* ── COUNT BAR ── */
.count-bar{
  padding:8px 16px;border-bottom:1px solid var(--border);
  font-size:12px;font-weight:400;color:var(--muted);
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
}
.count-bar strong{color:var(--char);font-weight:600;}
.count-bar button{
  font-size:11.5px;color:var(--red);background:none;border:none;
  cursor:pointer;font-family:'Poppins',sans-serif;font-weight:500;
  display:none;
}
.count-bar button:hover{text-decoration:underline;}

/* ── STORE LIST ── */
.slist{flex:1;overflow-y:auto;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}

.scard{
  padding:14px 16px;cursor:pointer;
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border);
  transition:background .1s,border-left-color .15s;
  position:relative;
}
.scard:hover{background:#fdf9f7;}
.scard.active{background:#fdf4f4;border-left-color:var(--red);}

.sc-top{display:flex;align-items:flex-start;gap:12px;}
.sc-logo-wrap{
  width:46px;height:46px;border-radius:9px;flex-shrink:0;
  background:var(--light);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:5px;
}
.sc-logo-wrap img{width:100%;height:100%;object-fit:contain;}
.sc-info{flex:1;min-width:0;}
.sc-chain{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:2px;
}
.sc-name{
  font-size:13px;font-weight:600;color:var(--char);
  margin-bottom:5px;line-height:1.35;
}
.sc-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.sc-status{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10.5px;font-weight:600;padding:2px 8px 2px 6px;
  border-radius:20px;white-space:nowrap;
}
.sc-status.open{background:#eaf6ec;color:#2d7a3a;}
.sc-status.open::before{content:'';width:6px;height:6px;border-radius:50%;background:#2d7a3a;flex-shrink:0;}
.sc-status.closed{background:#fdecea;color:#b83232;}
.sc-status.closed::before{content:'';width:6px;height:6px;border-radius:50%;background:#b83232;flex-shrink:0;}
.sc-dist{
  font-size:10.5px;color:var(--green);font-weight:600;
  display:none;align-items:center;gap:3px;white-space:nowrap;
}
.sc-hrs{font-size:11px;color:var(--muted);line-height:1.8;font-weight:300;}
.sc-hrs-row{display:flex;gap:8px;}
.sc-hrs-day{font-weight:500;min-width:60px;color:#555;}

.no-res{text-align:center;padding:60px 24px;color:var(--muted);}
.no-res .emoji{font-size:40px;display:block;margin-bottom:14px;}
.no-res p{font-size:13px;line-height:1.7;font-weight:300;}

/* ── MAP ── */
.map-area{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* ── INFO WINDOW ── */
.gm-ui-hover-effect{display:none!important;}
.iw-wrap{font-family:'Poppins',sans-serif;padding:2px 2px 0;min-width:230px;max-width:270px;}
.iw-logo-row{margin-bottom:10px;}
.iw-logo-row img{height:26px;object-fit:contain;}
.iw-chain{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px;}
.iw-name{font-size:15px;font-weight:600;color:var(--char);margin-bottom:8px;line-height:1.3;}
.iw-status{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10.5px;font-weight:600;padding:3px 9px 3px 7px;
  border-radius:20px;margin-bottom:10px;
}
.iw-status.open{background:#eaf6ec;color:#2d7a3a;}
.iw-status.open::before{content:'';width:6px;height:6px;border-radius:50%;background:#2d7a3a;}
.iw-status.closed{background:#fdecea;color:#b83232;}
.iw-status.closed::before{content:'';width:6px;height:6px;border-radius:50%;background:#b83232;}
.iw-hrs{font-size:11.5px;color:var(--muted);margin-bottom:12px;line-height:1.8;font-weight:300;}
.iw-hrs-row{display:flex;gap:12px;}
.iw-hrs-day{font-weight:500;min-width:55px;color:#555;}
.iw-btn{
  display:block;text-align:center;background:var(--char);color:#fff!important;
  text-decoration:none;padding:10px 14px;border-radius:9px;
  font-size:12px;font-weight:600;transition:background .15s;letter-spacing:.3px;
}
.iw-btn:hover{background:var(--red);}
.gm-style .gm-style-iw-c{
  padding:16px 16px 14px!important;border-radius:14px!important;
  box-shadow:0 10px 40px rgba(0,0,0,.18)!important;border:none!important;
}
.gm-style .gm-style-iw-d{overflow:visible!important;padding-right:0!important;}
.gm-style-iw-tc::after,.gm-style-iw-t::after{display:none!important;}
.gm-style .gm-style-iw-tc{display:none!important;}

@media(max-width:700px){
  .app{flex-direction:column;}
  .sidebar{width:100%;min-width:0;height:52%;flex-shrink:0;}
  .map-area{flex:1;}
}
</style>
</head>

<div class="app">

<!-- SIDEBAR -->

      Trouver des magasins à proximité

  </div>

  <div class="filters-wrap">

  <div class="count-bar">

  <div class="slist" id="slist"></div>
</aside>

<!-- MAP -->
<div class="map-area"><div id="map"></div></div>

</div>

// Set logo
document.getElementById('hd-logo').src = FRATELLI_LOGO;

const CHAINS_META = {
  Carrefour:   {color:'#004F9F'},
  Intermarché: {color:'#e30613'},
  Delhaize:    {color:'#C41230'},
  Spar:        {color:'#006f3c'},
  Cora:        {color:'#e85220'},
  Comarché:    {color:'#1a7a35'},
  Q8:          {color:'#c4940a'},
  Autre:       {color:'#888'},
};

let map, infoWindow, markers={}, userMarker=null;
let active = new Set(Object.keys(CHAINS_META));
let q='', selId=null;

/* STATUS */
function getStatus(hours){
  const now=new Date(), day=now.getDay(), hhmm=now.getHours()*60+now.getMinutes();
  for(const[range,time] of hours){
    const r=range.toLowerCase();
    const match = r==='lun-dim'
      ||(r==='lun-sam'&&day>=1&&day<=6)
      ||(r==='lun-ven'&&day>=1&&day<=5)
      ||(r==='sam'&&day===6)
      ||(r==='dim'&&day===0);
    if(match){
      const[o,c]=time.split('–');
      const m=t=>{const[h,mm]=t.split(':').map(Number);return h*60+mm;};
      return hhmm>=m(o)&&hhmm<m(c)?'open':'closed';
    }
  }
  return 'closed';
}

/* MARKER */
function makeMarkerDiv(s, hl=false){
  const logo=LOGOS[s.chain];
  const sz=hl?52:42;
  const border=`2.5px solid ${hl?(CHAINS_META[s.chain]?.color||'#333'):'#fff'}`;
  const shadow=hl?'0 4px 20px rgba(0,0,0,.35)':'0 2px 8px rgba(0,0,0,.22)';
  const img=logo
    ?`<img src="${logo}" style="width:${sz-12}px;height:${sz-12}px;object-fit:contain;border-radius:4px;">`
    :`<span style="font-size:10px;font-weight:700;color:${CHAINS_META[s.chain]?.color||'#333'}">${s.abbr}</span>`;
  return `<div style="
      width:${sz}px;height:${sz}px;border-radius:11px;background:#fff;
      border:${border};box-shadow:${shadow};
      display:flex;align-items:center;justify-content:center;
      transform-origin:bottom center;transform:${hl?'scale(1.1)':'scale(1)'};
      transition:all .2s;cursor:pointer;position:relative;">
    ${img}
    <div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
      width:10px;height:6px;background:${CHAINS_META[s.chain]?.color||'#333'};
      clip-path:polygon(50% 100%,0 0,100% 0);"></div>
  </div>`;
}

/* INFO WINDOW */
function makeIW(s){
  const status=getStatus(s.hours);
  const logo=LOGOS[s.chain];
  const meta=CHAINS_META[s.chain]||CHAINS_META.Autre;
  const hrsHTML=s.hours.map(([d,t])=>
    `<div class="iw-hrs-row"><span class="iw-hrs-day">${d}</span><span>${t}</span></div>`
  ).join('');
  const url=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+' Belgique')}`;
  return `<div class="iw-wrap">
    ${logo?`<div class="iw-logo-row"><img src="${logo}" alt="${s.chain}"></div>`:''}
    <div class="iw-chain" style="color:${meta.color}">${s.chain}</div>
    <div class="iw-name">${s.name}</div>
    <div class="iw-status ${status}">${status==='open'?'Ouvert maintenant':'Fermé'}</div>
    <div class="iw-hrs">${hrsHTML}</div>
    <a class="iw-btn" href="${url}" target="_blank">🗺 Itinéraire Google Maps</a>
  </div>`;
}

/* INIT MAP */
function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:50.50,lng:4.40},zoom:9,
    mapTypeControl:false,streetViewControl:false,fullscreenControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
    styles:[
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'road',elementType:'labels.icon',stylers:[{visibility:'off'}]},
      {featureType:'water',stylers:[{color:'#c9e8f5'}]},
      {featureType:'landscape',stylers:[{color:'#f5f3ef'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#f0e8d8'}]},
      {featureType:'road.arterial',elementType:'geometry',stylers:[{color:'#ffffff'}]},
    ]
  });
  infoWindow=new google.maps.InfoWindow({pixelOffset:new google.maps.Size(0,-8)});
  render();
}

/* FILTER */
function filtered(){
  const ql=q.toLowerCase().trim();
  return STORES.filter(s=>{
    if(!active.has(s.chain))return false;
    if(ql&&!s.name.toLowerCase().includes(ql)&&!s.city.toLowerCase().includes(ql))return false;
    return true;
  });
}

/* RENDER */
function render(){
  const vis=filtered();
  const visSet=new Set(vis.map(s=>s.id));
  document.getElementById('rcount').textContent=vis.length;
  const rb=document.getElementById('reset-btn');
  rb.style.display=(q||active.size<Object.keys(CHAINS_META).length)?'':'none';

  STORES.forEach(s=>{
    if(visSet.has(s.id)){
      if(!markers[s.id]){
        const ov=new google.maps.OverlayView();
        const div=document.createElement('div');
        div.style.cssText='position:absolute;cursor:pointer;';
        div.innerHTML=makeMarkerDiv(s,false);
        ov.onAdd=function(){this.getPanes().overlayMouseTarget.appendChild(div);};
        ov.draw=function(){
          const p=this.getProjection().fromLatLngToDivPixel(new google.maps.LatLng(s.lat,s.lng));
          const sz=42;
          div.style.left=(p.x-sz/2)+'px';
          div.style.top=(p.y-sz-6)+'px';
        };
        ov.onRemove=function(){div.parentNode&&div.parentNode.removeChild(div);};
        ov.setMap(map);
        div.addEventListener('click',()=>selectStore(s.id,true));
        markers[s.id]={ov,div,store:s};
      }
      markers[s.id].div.innerHTML=makeMarkerDiv(s,s.id===selId);
    } else {
      if(markers[s.id]){markers[s.id].ov.setMap(null);delete markers[s.id];}
    }
  });

  const listEl=document.getElementById('slist');
  if(!vis.length){
    listEl.innerHTML=`<div class="no-res"><span class="emoji">🍝</span><p>Aucun point de vente trouvé.<br>Modifiez votre recherche ou les filtres.</p></div>`;
    return;
  }
  listEl.innerHTML='';
  vis.forEach(s=>{
    const status=getStatus(s.hours);
    const meta=CHAINS_META[s.chain]||CHAINS_META.Autre;
    const logo=LOGOS[s.chain];
    const hrsHTML=s.hours.map(([d,t])=>
      `<div class="sc-hrs-row"><span class="sc-hrs-day">${d}</span><span>${t}</span></div>`
    ).join('');
    const card=document.createElement('div');
    card.className='scard'+(s.id===selId?' active':'');
    card.dataset.id=s.id;
    card.innerHTML=`
      <div class="sc-top">
        <div class="sc-logo-wrap">
          ${logo?`<img src="${logo}" alt="${s.chain}">`:`<span style="font-size:10px;font-weight:700;color:${meta.color}">${s.abbr}</span>`}
        </div>
        <div class="sc-info">
          <div class="sc-chain" style="color:${meta.color}">${s.chain}</div>
          <div class="sc-name">${s.name}</div>
          <div class="sc-row">
            <div class="sc-status ${status}">${status==='open'?'Ouvert':'Fermé'}</div>
            <div class="sc-dist" id="dist-${s.id}">📍 <span></span></div>
          </div>
          <div class="sc-hrs">${hrsHTML}</div>
        </div>
      </div>`;
    card.addEventListener('click',()=>selectStore(s.id,true));
    listEl.appendChild(card);
  });
}

/* SELECT — centre la carte sur le magasin */
function selectStore(id,pan){
  selId=id; render();
  const s=STORES.find(x=>x.id===id);
  if(!s)return;
  if(pan){
    map.panTo({lat:s.lat,lng:s.lng});
    if(map.getZoom()<14)map.setZoom(14);
  }
  infoWindow.setContent(makeIW(s));
  infoWindow.setPosition({lat:s.lat,lng:s.lng});
  infoWindow.open(map);
  const card=document.querySelector('.scard[data-id="'+id+'"]');
  if(card)card.scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* CHIPS */
const chipsEl=document.getElementById('chips');
Object.entries(CHAINS_META).forEach(([k,v])=>{
  const cnt=STORES.filter(s=>s.chain===k).length;
  if(!cnt)return;
  const btn=document.createElement('button');
  btn.className='chip on'; btn.dataset.chain=k;
  const logo=LOGOS[k];
  btn.innerHTML=(logo
    ?`<img src="${logo}" alt="${k}">`
    :`<span style="width:12px;height:12px;background:${v.color};border-radius:3px;display:inline-block"></span>`)
    +`${k} <span style="opacity:.4;font-size:10px">${cnt}</span>`;
  btn.addEventListener('click',()=>{
    if(active.has(k)){if(active.size===1)return;active.delete(k);btn.classList.remove('on');}
    else{active.add(k);btn.classList.add('on');}
    render();
  });
  chipsEl.appendChild(btn);
});

/* SEARCH */
const qEl=document.getElementById('q');
const clrBtn=document.getElementById('btn-clear');
qEl.addEventListener('input',e=>{
  q=e.target.value;selId=null;
  clrBtn.classList.toggle('show',q.length>0);
  render();
});
clrBtn.addEventListener('click',()=>{q='';qEl.value='';selId=null;clrBtn.classList.remove('show');render();});

function resetFilters(){
  q='';qEl.value='';selId=null;clrBtn.classList.remove('show');
  active=new Set(Object.keys(CHAINS_META));
  document.querySelectorAll('.chip').forEach(c=>c.classList.add('on'));
  render();
}

/* GEO */
document.getElementById('btn-geo').addEventListener('click',()=>{
  if(!navigator.geolocation){alert('Géolocalisation non disponible.');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    map.panTo({lat,lng});map.setZoom(13);
    if(userMarker)userMarker.setMap(null);
    userMarker=new google.maps.Marker({
      position:{lat,lng},map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,
        fillColor:'#2d7a3a',fillOpacity:1,strokeColor:'#fff',strokeWeight:2.5},
      title:'Vous êtes ici',zIndex:999
    });
    new google.maps.InfoWindow({content:'<div style="padding:6px 10px;font-family:Poppins,sans-serif;font-size:12px;font-weight:500;">📍 Vous êtes ici</div>'}).open(map,userMarker);

    const withDist=STORES.filter(s=>active.has(s.chain))
      .map(s=>({...s,dist:Math.sqrt((s.lat-lat)**2+(s.lng-lng)**2)}))
      .sort((a,b)=>a.dist-b.dist);

    withDist.forEach(s=>{
      const km=(s.dist*111).toFixed(1);
      const el=document.getElementById('dist-'+s.id);
      if(el){el.querySelector('span').textContent=km+' km';el.style.display='flex';}
    });
    if(withDist[0])setTimeout(()=>selectStore(withDist[0].id,false),700);
  },()=>alert("Impossible d'obtenir votre position."));
});
</script>

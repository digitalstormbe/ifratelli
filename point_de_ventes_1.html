<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>i Fratelli — Points de Vente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --black:#0a0a0a; --gold:#F0D080; --white:#fff;
  --t2:rgba(255,255,255,.65); --t3:rgba(255,255,255,.4); --t4:rgba(255,255,255,.2);
  --bd:rgba(255,255,255,.07); --sw:400px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--black);overflow:hidden;color:var(--white);}
.app{display:flex;height:100vh;}

.sidebar{width:var(--sw);min-width:var(--sw);display:flex;flex-direction:column;background:#111;border-right:1px solid var(--bd);z-index:100;}

.hd{padding:22px 24px 18px;flex-shrink:0;border-bottom:1px solid var(--bd);position:relative;}
.hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.hd-logo{height:44px;display:block;}
.hd-back{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);transition:color .2s;text-decoration:none;}
.hd-back:hover{color:var(--gold);}
.hd-title{font-size:21px;font-weight:600;letter-spacing:-.025em;margin-bottom:6px;}
.hd-title em{color:var(--gold);font-style:normal;}
.hd-live{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;}
.pulse{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(76,175,80,.5)}70%{box-shadow:0 0 0 7px rgba(76,175,80,0)}100%{box-shadow:0 0 0 0 rgba(76,175,80,0)}}

.search-wrap{padding:14px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.search-box{display:flex;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.search-box:focus-within{border-color:rgba(240,208,128,.35);box-shadow:0 0 0 3px rgba(240,208,128,.07);}
.search-box input{flex:1;border:none;outline:none;background:transparent;padding:11px 12px;font-family:'Poppins',sans-serif;font-size:13px;color:var(--white);}
.search-box input::placeholder{color:var(--t4);}
.s-ico{padding:0 12px;color:var(--t4);display:flex;align-items:center;}
.s-clear{padding:0 12px;color:var(--t4);cursor:pointer;display:none;align-items:center;transition:color .15s;}
.s-clear:hover{color:var(--white);}
.s-clear.show{display:flex;}
.btn-geo{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;padding:9px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--bd);font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.btn-geo:hover{border-color:rgba(240,208,128,.3);color:var(--gold);}

.filters{padding:10px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap;}
.chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;border:1px solid var(--bd);font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:var(--t3);cursor:pointer;background:transparent;transition:all .18s;white-space:nowrap;}
.chip.active{background:var(--gold);border-color:var(--gold);color:var(--black);}
.chip-logo{width:14px;height:14px;object-fit:contain;}

.stats{padding:9px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.stats-n{font-size:13px;font-weight:600;}
.stats-n em{color:var(--gold);font-style:normal;}
.stats-lbl{font-size:11px;color:var(--t4);}

.list{flex:1;overflow-y:auto;}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

.sitem{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s;position:relative;}
.sitem:hover{background:rgba(255,255,255,.04);}
.sitem.active{background:rgba(240,208,128,.07);}
.sitem.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);}
.sitem-badge{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,.06);}
.sitem-badge img{width:28px;height:28px;object-fit:contain;}
.sitem-badge.text{font-size:11px;font-weight:600;color:#fff;}
.sitem-info{flex:1;min-width:0;}
.sitem-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.sitem-meta{display:flex;align-items:center;gap:6px;}
.sitem-city{font-size:11px;color:var(--t3);}
.badge-open{font-size:10px;font-weight:600;padding:1px 6px;border-radius:100px;background:rgba(76,175,80,.15);color:#4caf50;letter-spacing:.02em;}
.badge-closed{font-size:10px;font-weight:600;padding:1px 6px;border-radius:100px;background:rgba(255,80,80,.12);color:#ff6060;letter-spacing:.02em;}
.sitem-arr{font-size:13px;color:var(--t4);transition:color .15s,transform .15s;}
.sitem:hover .sitem-arr,.sitem.active .sitem-arr{color:var(--gold);transform:translate(2px,-1px);}
.empty{padding:48px 20px;text-align:center;color:var(--t3);font-size:13px;line-height:2.5;}

/* DETAIL PANEL */
.detail{position:absolute;bottom:0;left:0;right:0;z-index:300;background:#161616;border-top:1px solid var(--bd);border-radius:16px 16px 0 0;padding:18px 20px 28px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);}
.detail.open{transform:translateY(0);}
.detail-handle{width:30px;height:3px;border-radius:2px;background:rgba(255,255,255,.12);margin:0 auto 16px;}
.detail-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.detail-badge{width:52px;height:52px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,.06);}
.detail-badge img{width:36px;height:36px;object-fit:contain;}
.detail-badge.text{font-size:14px;font-weight:600;color:#fff;}
.detail-info{flex:1;}
.detail-name{font-size:16px;font-weight:600;letter-spacing:-.015em;margin-bottom:3px;}
.detail-city{font-size:12px;color:var(--t3);margin-bottom:6px;}
.detail-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.02em;}
.detail-status.open{color:#4caf50;}
.detail-status.closed{color:#ff6060;}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

.hours-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);margin-bottom:8px;}
.detail-hours{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.dh-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.dh-row:last-child{border:none;}
.dh-row.today{background:rgba(240,208,128,.05);margin:0 -14px;padding:5px 14px;border-radius:4px;}
.dh-day{color:var(--t3);}
.dh-row.today .dh-day{color:var(--gold);font-weight:500;}
.dh-time{font-weight:500;}
.dh-row.today .dh-time{color:var(--gold);}

.btn-nav{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--gold);border:none;border-radius:12px;padding:13px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;color:var(--black);cursor:pointer;transition:all .2s;letter-spacing:.02em;}
.btn-nav:hover{background:#f5d960;transform:translateY(-1px);}

.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.leaflet-tile-pane{filter:brightness(.82) contrast(1.1) saturate(.85);}
.leaflet-control-attribution{background:rgba(10,10,10,.75)!important;color:rgba(255,255,255,.25)!important;font-size:9px!important;}
.leaflet-control-attribution a{color:rgba(255,255,255,.3)!important;}

.mk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 8px rgba(0,0,0,.5);overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;background:rgba(255,255,255,.08);}
.mk img{width:22px;height:22px;object-fit:contain;}
.mk.sel{transform:scale(1.35);border-color:#F0D080!important;box-shadow:0 0 0 4px rgba(240,208,128,.25),0 4px 16px rgba(0,0,0,.5);}

.leaflet-popup-content-wrapper{background:#161616!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:12px!important;color:#fff!important;padding:0!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-tip{background:#161616!important;}
.leaflet-popup-close-button{color:rgba(255,255,255,.4)!important;top:8px!important;right:10px!important;font-size:18px!important;}

@media(max-width:768px){
  .app{flex-direction:column;}
  .sidebar{width:100%;min-width:0;height:56vh;}
  .map-wrap{height:44vh;}
}
</style>
</head>

function chainKey(n){return n==='Intermarché'?'Intermarche':n==='Comarché'?'Comarche':n;}

// ── OPEN/CLOSED LOGIC ──
function parseTime(s){
  const [h,m]=(s||'').split(':').map(Number);
  return (h||0)*60+(m||0);
}

const DAY_KEYS = {
  'lun':1,'mar':2,'mer':3,'jeu':4,'ven':5,'sam':6,'dim':0
};

function isOpenNow(hours){
  if(!hours||!hours.length) return null;
  const now = new Date();
  const nowDay = now.getDay(); // 0=dim
  const nowMin = now.getHours()*60 + now.getMinutes();

  for(const [label, range] of hours){
    // Parse day range e.g. "lun-sam", "lun-ven", "dim", "lun-dim"
    const parts = label.toLowerCase().split('-');
    let matchDay = false;
    if(parts.length===1){
      matchDay = (DAY_KEYS[parts[0]]===nowDay);
    } else {
      const start = DAY_KEYS[parts[0]];
      const end   = DAY_KEYS[parts[1]];
      // Handle wrap (e.g. lun=1 to dim=0 means 1-6)
      if(start<=end){
        matchDay = (nowDay>=start && nowDay<=end);
      } else {
        matchDay = (nowDay>=start || nowDay<=end);
      }
    }
    // "lun-dim" = every day
    if(label.toLowerCase()==='lun-dim') matchDay=true;

    if(matchDay){
      const [open,close]=(range||'').split('–');
      const openMin=parseTime(open);
      const closeMin=parseTime(close);
      if(!closeMin) return true; // unknown close = assume open
      return (nowMin>=openMin && nowMin<closeMin);
    }
  }
  return false;
}

function isOpenLabel(hours){
  const r = isOpenNow(hours);
  if(r===null) return null;
  return r;
}

// ── MARKERS ──
const mkrs={};
STORES.forEach(s=>{
  const color=CHAIN_COLORS[s.chain]||'#555';
  const logo=CHAIN_LOGOS[chainKey(s.chain)];
  const inner=logo
    ? '<img src="'+logo+'" style="width:22px;height:22px;object-fit:contain;">'
    : '<span style="font-size:9px;font-weight:700;color:#fff">'+s.chain.slice(0,2)+'</span>';
  const icon=L.divIcon({
    html:'<div class="mk" id="mk-'+s.id+'" style="border-color:'+color+'40">'+inner+'</div>',
    className:'',iconSize:[32,32],iconAnchor:[16,16]
  });
  mkrs[s.id]=L.marker([s.lat,s.lng],{icon}).addTo(map).on('click',()=>select(s.id));
});

// ── FILTERS ──
const filtersEl=document.getElementById('filters');
[...new Set(STORES.map(s=>s.chain))].sort().forEach(chain=>{
  const btn=document.createElement('button');
  btn.className='chip'; btn.dataset.chain=chain;
  const logo=CHAIN_LOGOS[chainKey(chain)];
  btn.innerHTML=(logo?'<img class="chip-logo" src="'+logo+'" alt="'+chain+'">':'')+chain;
  filtersEl.appendChild(btn);
});

let activeChain='all', selId=null;
filtersEl.addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  activeChain=chip.dataset.chain;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.chain===activeChain));
  render();
});

const qEl=document.getElementById('q'), clearEl=document.getElementById('s-clear');
qEl.addEventListener('input',()=>{clearEl.classList.toggle('show',qEl.value.length>0);render();});
clearEl.addEventListener('click',()=>{qEl.value='';clearEl.classList.remove('show');render();});

function filtered(){
  const q=qEl.value.toLowerCase().trim();
  return STORES.filter(s=>{
    const cOk=activeChain==='all'||s.chain===activeChain;
    const sOk=!q||s.name.toLowerCase().includes(q)||s.city.toLowerCase().includes(q);
    return cOk&&sOk;
  });
}

function render(){
  const vis=filtered();
  document.getElementById('vis-count').textContent=vis.length;
  document.getElementById('hd-count').textContent=vis.length+' points en Belgique';
  const visIds=new Set(vis.map(s=>s.id));
  STORES.forEach(s=>{
    const el=document.getElementById('mk-'+s.id);
    if(el){const w=el.closest('.leaflet-marker-icon');if(w)w.style.display=visIds.has(s.id)?'':'none';}
  });
  const list=document.getElementById('list');
  if(!vis.length){
    list.innerHTML='<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><br>Aucun résultat</div>';
    return;
  }
  list.innerHTML=vis.map(s=>{
    const logo=CHAIN_LOGOS[chainKey(s.chain)];
    const color=CHAIN_COLORS[s.chain]||'#555';
    const open=isOpenLabel(s.hours);
    const badge=logo
      ? '<div class="sitem-badge"><img src="'+logo+'" alt="'+s.chain+'"></div>'
      : '<div class="sitem-badge text" style="background:'+color+'">'+s.chain.slice(0,2)+'</div>';
    const statusBadge = open===null ? ''
      : open ? '<span class="badge-open">Ouvert</span>'
              : '<span class="badge-closed">Fermé</span>';
    return '<div class="sitem'+(s.id===selId?' active':'')+'" data-id="'+s.id+'">'
      +badge
      +'<div class="sitem-info">'
      +'<div class="sitem-name">'+s.name+'</div>'
      +'<div class="sitem-meta"><span class="sitem-city">'+s.city+'</span>'+statusBadge+'</div>'
      +'</div>'
      +'<span class="sitem-arr">↗</span>'
      +'</div>';
  }).join('');
  list.querySelectorAll('.sitem').forEach(el=>el.addEventListener('click',()=>select(+el.dataset.id)));
}

// ── SELECT ──
function getTodayLabel(){
  const d=['dim','lun','mar','mer','jeu','ven','sam'][new Date().getDay()];
  return d;
}

function select(id){
  selId=id;
  const s=STORES.find(x=>x.id===id);if(!s)return;
  document.querySelectorAll('.sitem').forEach(el=>el.classList.toggle('active',+el.dataset.id===id));
  document.querySelectorAll('.mk').forEach(el=>el.classList.remove('sel'));
  const mm=document.getElementById('mk-'+id);if(mm)mm.classList.add('sel');
  map.flyTo([s.lat,s.lng],15,{animate:true,duration:.8});

  const logo=CHAIN_LOGOS[chainKey(s.chain)];
  const color=CHAIN_COLORS[s.chain]||'#555';
  const badge=document.getElementById('dp-badge');
  if(logo){badge.innerHTML='<img src="'+logo+'" style="width:36px;height:36px;object-fit:contain;">';badge.classList.remove('text');badge.style.background='';}
  else{badge.textContent=s.chain.slice(0,2);badge.classList.add('text');badge.style.background=color;}

  document.getElementById('dp-name').textContent=s.name;
  document.getElementById('dp-city').textContent=s.city;

  // Open/closed status
  const open=isOpenLabel(s.hours);
  const statusEl=document.getElementById('dp-status');
  if(open===null){statusEl.innerHTML='';}
  else if(open){statusEl.innerHTML='<span class="status-dot"></span>Ouvert maintenant';statusEl.className='detail-status open';}
  else{statusEl.innerHTML='<span class="status-dot"></span>Fermé en ce moment';statusEl.className='detail-status closed';}

  // Hours — highlight today's row
  const todayKey=getTodayLabel();
  document.getElementById('dp-hours').innerHTML=(s.hours||[]).map(([d,t])=>{
    const isToday=d.toLowerCase().includes(todayKey)||(d.toLowerCase()==='lun-dim');
    return '<div class="dh-row'+(isToday?' today':'')+'"><span class="dh-day">'+d+'</span><span class="dh-time">'+t+'</span></div>';
  }).join('')||'<div style="font-size:12px;color:var(--t3)">Horaires non renseignés</div>';

  document.getElementById('dp-nav').onclick=()=>window.open('https://www.google.com/maps/dir/?api=1&destination='+s.lat+','+s.lng,'_blank');
  document.getElementById('detail').classList.add('open');
  const el=document.querySelector('.sitem.active');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

map.on('click',()=>{
  document.getElementById('detail').classList.remove('open');
  selId=null;
  document.querySelectorAll('.sitem').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.mk').forEach(el=>el.classList.remove('sel'));
});

document.getElementById('btn-geo').addEventListener('click',()=>{
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(p=>map.flyTo([p.coords.latitude,p.coords.longitude],13));
});

render();
</script>
</body>
</html>
